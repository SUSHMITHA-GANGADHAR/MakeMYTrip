{% extends 'base.html' %}

{% block title %}Forgot Password | MakeMyTrip{% endblock %}

{% block content %}
<div class="glass-card auth-container" style="max-width: 450px; margin: 6rem auto; padding: 3rem;">
    <div class="auth-header" style="text-align: center; margin-bottom: 2rem;">
        <h2>Reset Password</h2>
        <p style="color: var(--text-muted);">Enter your email to receive a reset link.</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 0.8rem 1.2rem; background: var(--bg-muted); border: 1px solid var(--glass-border); border-radius: 0.75rem; color: white; outline: none;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
    </form>

    <div style="text-align: center; margin-top: 2rem;">
        <a href="{% url 'accounts:login' %}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>
{% endblock %}
