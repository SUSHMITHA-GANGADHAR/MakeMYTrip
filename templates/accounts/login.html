{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Make My Trip{% endblock %}

{% block content %}
<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="glass-card" style="padding: 3rem; width: 100%; max-width: 450px;">
        <h2 style="color: var(--primary); text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h2>
        
        {% if messages %}
        <div style="margin-bottom: 1.5rem;">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" style="font-size: 0.9rem; padding: 0.75rem;">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.8rem 1.2rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 0.75rem; color: white; outline: none;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.8rem 1.2rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 0.75rem; color: white; outline: none;">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" name="remember_me"> Remember Me
                </label>
                <a href="{% url 'accounts:forgot_password' %}" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'accounts:register' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign Up</a>
        </p>
    </div>
</div>
{% endblock %}
