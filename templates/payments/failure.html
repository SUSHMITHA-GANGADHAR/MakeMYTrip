{% extends 'base.html' %}

{% block title %}Payment Failed | MakeMyTrip{% endblock %}

{% block content %}
<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="glass-card" style="padding: 4rem; text-align: center; max-width: 500px;">
        <i class="fas fa-times-circle" style="font-size: 5rem; color: var(--accent); margin-bottom: 2rem;"></i>
        <h2 style="margin-bottom: 1rem;">Payment Failed</h2>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem;">We couldn't process your transaction. Please check your payment details and try again.</p>
        
        <div style="display: flex; gap: 1rem;">
            <a href="{% url 'trips:index' %}" class="btn btn-outline" style="flex: 1; text-align: center;">Go Home</a>
            <a href="{% url 'dashboard:customer_dashboard' %}" class="btn btn-primary" style="flex: 1; text-align: center;">Try Again</a>
        </div>
    </div>
</div>
{% endblock %}
