{% extends 'base.html' %}

{% block title %}Complete Payment | MakeMyTrip{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 6rem auto; padding: 3rem; text-align: center;">
    <h2 style="margin-bottom: 1.5rem;">Secure Payment</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem;">You are booking <strong>{{ booking.trip.destination }}</strong> for <strong>₹{{ booking.total_price }}</strong>.</p>
    
    <button id="rzp-button1" class="btn btn-primary" style="width: 100%; padding: 1rem;">Pay with Razorpay</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_key_id }}",
    "amount": "{{ payment.amount|floatformat:0 }}00",
    "currency": "INR",
    "name": "MakeMyTrip",
    "description": "Payment for {{ booking.trip.destination }}",
    "order_id": "{{ razorpay_order_id }}",
    "callback_url": "{{ callback_url }}",
    "prefill": {
        "name": "{{ booking.user.name }}",
        "email": "{{ booking.user.email }}",
        "contact": "{{ booking.user.phone }}"
    },
    "theme": {
        "color": "#6366f1"
    }
};
var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>
{% endblock %}
